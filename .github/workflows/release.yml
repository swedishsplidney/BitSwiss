name: build prebuilt binaries

on:
  push:
    tags:
      - 'v*'

# grants write access so the automated runner can attach files to release dashboard
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # keeps other OS jobs running even if one fails
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      # linux Environment Setup
      - name: install linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libcurl4-openssl-dev libglfw3-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxkbcommon-dev

      # macOS Environment Setup
      - name: install macOS dependencies
        if: matrix.os == 'macos-latest'
        run: |
          brew install cmake curl glfw

      # windows Environment Setup
      - name: install windows dependencies
        if: matrix.os == 'windows-latest'
        run: |
          vcpkg install curl:x64-windows glfw3:x64-windows

      # configure CMake (Windows native vcpkg integration)
      - name: configure CMake (Windows)
        if: matrix.os == 'windows-latest'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake

      # configure CMake (Unix systems)
      - name: configure CMake (Unix)
        if: matrix.os != 'windows-latest'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      # compile binary targets across the build matrix
      - name: build binary
        run: cmake --build build --config Release

      # macOS specific step
      - name: compress macOS app bundle
        if: matrix.os == 'macos-latest'
        run: |
          cd build
          zip -r BitSwiss-${{ github.ref_name }}-macOS.zip BitSwiss.app || zip -r BitSwiss-${{ github.ref_name }}-macOS.zip BitSwiss

      # linux specific step
      - name: Rename Linux binary
        if: matrix.os == 'ubuntu-latest'
        run: |
          mv build/BitSwiss build/BitSwiss-${{ github.ref_name }}-linux-x64

      # windows specific step
      - name: package windows zip with depends
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if (Test-Path "dist") { Remove-Item -Recurse -Force "dist" }
          mkdir dist
          
          Copy-Item "build/Release/BitSwiss.exe" -Destination "dist/BitSwiss.exe" -Force
          
          if (Test-Path "C:/vcpkg/installed/x64-windows/bin/libcurl.dll") {
            Copy-Item "C:/vcpkg/installed/x64-windows/bin/libcurl.dll" -Destination "dist/libcurl.dll" -Force
          } else {
            Get-ChildItem -Path "build/" -Filter "libcurl.dll" -Recurse | Select-Object -First 1 | Copy-Item -Destination "dist/libcurl.dll" -Force
          }
          
          Compress-Archive -Path dist/* -DestinationPath build/BitSwiss-${{ github.ref_name }}-win64.zip -Force

      # asset upload
      - name: upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            build/BitSwiss-${{ github.ref_name }}-linux-x64
            build/BitSwiss-${{ github.ref_name }}-macOS.zip
            build/BitSwiss-${{ github.ref_name }}-win64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}